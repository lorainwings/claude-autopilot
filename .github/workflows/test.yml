name: Plugin Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'

jobs:
  test-hooks:
    name: Test Hook Scripts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Verify python3 available
        run: python3 --version

      - uses: oven-sh/setup-bun@v2

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Run hook test suite
        run: bash plugins/spec-autopilot/tests/run_all.sh
