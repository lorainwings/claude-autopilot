name: Plugin Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/**'

jobs:
  release-discipline:
    name: Release Discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check release discipline (pull_request)
        if: github.event_name == 'pull_request'
        run: bash scripts/check-release-discipline.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: Check release discipline (push)
        if: github.event_name == 'push'
        run: bash scripts/check-release-discipline.sh "${{ github.event.before }}" "${{ github.sha }}"

  test-hooks:
    name: Test Hook Scripts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Verify python3 available
        run: python3 --version

      - uses: oven-sh/setup-bun@v2

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Run hook test suite
        run: bash plugins/spec-autopilot/tests/run_all.sh

      - name: Run release smoke suite
        run: bash plugins/spec-autopilot/tests/smoke_release.sh

  lint:
    name: Lint (shellcheck + shfmt + ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck + shfmt
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

      - name: Install ruff + mypy
        run: pip install ruff mypy

      - name: Run lint + format check
        run: make lint && make format

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Install server dependencies
        run: cd plugins/spec-autopilot/runtime/server && bun install --frozen-lockfile

      - name: Run typecheck
        run: make typecheck

  build-dist:
    name: Build & Verify dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Build dist
        run: make build
