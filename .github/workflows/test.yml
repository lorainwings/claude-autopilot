name: Plugin Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/**'
      - '.claude-plugin/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/**'
      - '.claude-plugin/**'
      - 'scripts/**'

jobs:
  # ── release discipline ────────────────────────────────────────────

  release-discipline:
    name: Release Discipline Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check release discipline (both plugins)
        run: bash scripts/check-release-discipline.sh ${{ steps.base.outputs.ref }} ${{ github.sha }}

  # ── spec-autopilot ────────────────────────────────────────────────

  test-hooks:
    name: spec-autopilot / Hook Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Verify python3 available
        run: python3 --version

      - uses: oven-sh/setup-bun@v2

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Run hook test suite
        run: bash plugins/spec-autopilot/tests/run_all.sh

      - name: Run release smoke suite
        run: bash plugins/spec-autopilot/tests/smoke_release.sh

  lint:
    name: spec-autopilot / Lint (shellcheck + shfmt + ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck + shfmt
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

      - name: Install ruff + mypy
        run: pip install ruff mypy

      - name: Run lint + format check
        run: make lint && make format

  typecheck:
    name: spec-autopilot / TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Install server dependencies
        run: cd plugins/spec-autopilot/runtime/server && bun install --frozen-lockfile

      - name: Run typecheck
        run: make typecheck

  build-dist:
    name: spec-autopilot / Build & Verify dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Build dist
        run: make build

  # ── parallel-harness ──────────────────────────────────────────────

  ph-typecheck:
    name: parallel-harness / TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Run typecheck
        run: make ph-typecheck

  ph-test:
    name: parallel-harness / Unit & Integration Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Run tests
        run: make ph-test

  ph-lint:
    name: parallel-harness / Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: make ph-lint

  ph-build:
    name: parallel-harness / Build dist
    runs-on: ubuntu-latest
    needs: [ph-typecheck, ph-test, ph-lint]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Build dist
        run: make ph-build

      - name: Verify dist structure
        run: |
          test -d dist/parallel-harness/.claude-plugin
          test -f dist/parallel-harness/.claude-plugin/plugin.json
          test -d dist/parallel-harness/runtime
          test -d dist/parallel-harness/skills
          test -d dist/parallel-harness/config
          test -f dist/parallel-harness/CLAUDE.md
          echo "dist/parallel-harness structure OK"
