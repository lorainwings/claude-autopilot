name: daily-report Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/daily-report/**'
      - 'dist/daily-report/**'
      - '.github/workflows/test-daily-report.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
      - 'Makefile'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.shellcheckrc'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/daily-report/**'
      - 'dist/daily-report/**'
      - '.github/workflows/test-daily-report.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
      - 'Makefile'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.shellcheckrc'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ── bot commit bypass ─────────────────────────────────────────────

  should-run:
    name: Check if CI should run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      skip_dist_stale: ${{ steps.check.outputs.skip_dist_stale }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 10

      - name: Detect release context
        id: check
        run: |
          eval "$(bash scripts/ci-detect-release-context.sh "${{ github.event.before || '' }}" "${{ github.sha }}")"
          echo "skip=${SKIP_WHOLE_CI}" >> "$GITHUB_OUTPUT"
          echo "skip_dist_stale=${SKIP_DIST_STALE}" >> "$GITHUB_OUTPUT"
          echo "ℹ️  SKIP_WHOLE_CI=${SKIP_WHOLE_CI} SKIP_DIST_STALE=${SKIP_DIST_STALE} IS_RELEASE_BOT=${IS_RELEASE_BOT} IS_POST_RELEASE_BOT=${IS_POST_RELEASE_BOT}"

  # ── release discipline ────────────────────────────────────────────

  release-discipline:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: Release Discipline Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            BEFORE="${{ github.event.before }}"
            if git rev-parse --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
              echo "ref=${BEFORE}" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️  before ref ${BEFORE} not found (force-push?), falling back to HEAD~1"
              echo "ref=${{ github.sha }}~1" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check release discipline (daily-report)
        run: bash scripts/check-release-discipline.sh ${{ steps.base.outputs.ref }} ${{ github.sha }} daily-report

  # ── daily-report ─────────────────────────────────────────────────

  dr-lint:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: daily-report / Lint (shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: make dr-lint

  dr-build:
    name: daily-report / Build dist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [should-run, release-discipline, dr-lint]
    if: needs.should-run.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Build dist
        run: make dr-build

      - name: Verify dist structure
        run: |
          test -d dist/daily-report/.claude-plugin
          test -f dist/daily-report/.claude-plugin/plugin.json
          test -d dist/daily-report/skills
          test -f dist/daily-report/CLAUDE.md
          echo "dist/daily-report structure OK"

      - name: Check dist not stale
        if: needs.should-run.outputs.skip_dist_stale != 'true'
        run: |
          STALE=0
          if ! git diff --exit-code dist/daily-report; then
            echo "❌ dist/daily-report has modified tracked files"
            STALE=1
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard dist/daily-report)
          if [ -n "$UNTRACKED" ]; then
            echo "❌ dist/daily-report has untracked files:"
            echo "$UNTRACKED"
            STALE=1
          fi
          if [ "$STALE" -eq 1 ]; then
            echo "Run 'make dr-build' and commit the result"
            exit 1
          fi
          echo "✅ dist/daily-report is up-to-date"
