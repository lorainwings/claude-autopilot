name: spec-autopilot Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/spec-autopilot/**'
      - 'dist/spec-autopilot/**'
      - '.github/workflows/test-spec-autopilot.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
      - 'Makefile'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.shellcheckrc'
      - 'plugins/spec-autopilot/pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/spec-autopilot/**'
      - 'dist/spec-autopilot/**'
      - '.github/workflows/test-spec-autopilot.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
      - 'Makefile'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.shellcheckrc'
      - 'plugins/spec-autopilot/pyproject.toml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ── bot commit bypass ─────────────────────────────────────────────
  # 仅跳过 github-actions bot 的 post-release 回写提交。
  # release-please PR 本身不跳过，保证 typecheck/test/lint 正常执行。

  should-run:
    name: Check if CI should run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      skip_dist_stale: ${{ steps.check.outputs.skip_dist_stale }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 10

      - name: Detect release context
        id: check
        run: |
          eval "$(bash scripts/ci-detect-release-context.sh "${{ github.event.before || '' }}" "${{ github.sha }}")"

          echo "skip=${SKIP_WHOLE_CI}" >> "$GITHUB_OUTPUT"
          echo "skip_dist_stale=${SKIP_DIST_STALE}" >> "$GITHUB_OUTPUT"

          echo "ℹ️  SKIP_WHOLE_CI=${SKIP_WHOLE_CI} SKIP_DIST_STALE=${SKIP_DIST_STALE} IS_RELEASE_BOT=${IS_RELEASE_BOT} IS_POST_RELEASE_BOT=${IS_POST_RELEASE_BOT}"

  # ── release discipline ────────────────────────────────────────────

  release-discipline:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: Release Discipline Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            BEFORE="${{ github.event.before }}"
            if git rev-parse --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
              echo "ref=${BEFORE}" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️  before ref ${BEFORE} not found (force-push?), falling back to HEAD~1"
              echo "ref=${{ github.sha }}~1" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check release discipline (spec-autopilot)
        run: bash scripts/check-release-discipline.sh ${{ steps.base.outputs.ref }} ${{ github.sha }} spec-autopilot

  # ── spec-autopilot ────────────────────────────────────────────────

  test-hooks:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: spec-autopilot / Hook Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Verify python3 available
        run: python3 --version

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: |
            plugins/spec-autopilot/gui/bun.lock
            plugins/spec-autopilot/runtime/server/bun.lock

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Run hook test suite
        run: bash plugins/spec-autopilot/tests/run_all.sh

      - name: Run release smoke suite
        run: bash plugins/spec-autopilot/tests/smoke_release.sh

  lint:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: spec-autopilot / Lint (shellcheck + shfmt + ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck + shfmt
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

      - name: Install ruff + mypy (version from Makefile)
        run: |
          RUFF_V=$(grep '^RUFF_VERSION' Makefile | head -1 | sed 's/.*:= *//')
          MYPY_V=$(grep '^MYPY_VERSION' Makefile | head -1 | sed 's/.*:= *//')
          pip install "ruff==${RUFF_V}" "mypy==${MYPY_V}"

      - name: Run lint (includes format checks)
        run: make lint

  typecheck:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: spec-autopilot / TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: |
            plugins/spec-autopilot/gui/bun.lock
            plugins/spec-autopilot/runtime/server/bun.lock

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Install server dependencies
        run: cd plugins/spec-autopilot/runtime/server && bun install --frozen-lockfile

      - name: Run typecheck
        run: make typecheck

  build-dist:
    needs: [should-run, release-discipline, test-hooks, lint, typecheck]
    if: needs.should-run.outputs.skip != 'true'
    name: spec-autopilot / Build & Verify dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: plugins/spec-autopilot/gui/bun.lock

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Build dist
        run: make build

      - name: Verify dist structure
        run: |
          test -d dist/spec-autopilot/.claude-plugin
          test -f dist/spec-autopilot/.claude-plugin/plugin.json
          test -d dist/spec-autopilot/hooks
          test -d dist/spec-autopilot/skills
          test -d dist/spec-autopilot/runtime
          test -f dist/spec-autopilot/CLAUDE.md
          echo "dist/spec-autopilot structure OK"

      - name: Check dist not stale
        if: needs.should-run.outputs.skip_dist_stale != 'true'
        run: |
          STALE=0
          if ! git diff --exit-code dist/spec-autopilot; then
            echo "❌ dist/spec-autopilot has modified tracked files"
            STALE=1
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard dist/spec-autopilot)
          if [ -n "$UNTRACKED" ]; then
            echo "❌ dist/spec-autopilot has untracked files:"
            echo "$UNTRACKED"
            STALE=1
          fi
          if [ "$STALE" -eq 1 ]; then
            echo "Run 'make build' and commit the result"
            exit 1
          fi
          echo "✅ dist/spec-autopilot is up-to-date"
