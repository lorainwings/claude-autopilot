name: spec-autopilot Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/spec-autopilot/**'
      - 'dist/spec-autopilot/**'
      - '.github/workflows/test-spec-autopilot.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/spec-autopilot/**'
      - 'dist/spec-autopilot/**'
      - '.github/workflows/test-spec-autopilot.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ── bot commit bypass ─────────────────────────────────────────────
  # release-please merge / post-release bot 提交会修改 plugins/spec-autopilot/ 版本文件，
  # 触发本 workflow，但此时 dist 尚未由 post-release job 重建，导致 dist stale 检查失败。
  # 这里前置检测，bot 提交直接跳过所有后续 job。
  #
  # 注意: should-run 要求 author AND message 双重匹配——这是有意为之:
  # 当人工合并 Release PR 时，author 是人(skip=false)，CI 仍会执行 test/lint/typecheck，
  # 但 build-dist 的 dist staleness 检查单独按 commit message 匹配跳过（因为 post-release 会负责 dist）。

  should-run:
    name: Check if CI should run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect bot commits
        id: check
        run: |
          AUTHOR=$(git log -1 --format='%an')
          MSG=$(git log -1 --format='%s')
          if [[ "$AUTHOR" == *"github-actions"* ]] && \
             { [[ "$MSG" =~ ^chore:\ release\ main ]] || \
               [[ "$MSG" =~ ^chore\(main\):\ release ]] || \
               [[ "$MSG" =~ ^chore:\ post-release ]]; }; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Bot commit detected ($MSG) — skipping CI"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # ── release discipline ────────────────────────────────────────────

  release-discipline:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: Release Discipline Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            BEFORE="${{ github.event.before }}"
            # force-push 会使 before SHA 失效，回退到父提交
            if git rev-parse --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
              echo "ref=${BEFORE}" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️  before ref ${BEFORE} not found (force-push?), falling back to HEAD~1"
              echo "ref=${{ github.sha }}~1" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check release discipline (spec-autopilot)
        run: bash scripts/check-release-discipline.sh ${{ steps.base.outputs.ref }} ${{ github.sha }} spec-autopilot

  # ── spec-autopilot ────────────────────────────────────────────────

  test-hooks:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: spec-autopilot / Hook Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Verify python3 available
        run: python3 --version

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: |
            plugins/spec-autopilot/gui/bun.lock
            plugins/spec-autopilot/runtime/server/bun.lock

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Run hook test suite
        run: bash plugins/spec-autopilot/tests/run_all.sh

      - name: Run release smoke suite
        run: bash plugins/spec-autopilot/tests/smoke_release.sh

  lint:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: spec-autopilot / Lint (shellcheck + shfmt + ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck + shfmt
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

      - name: Install ruff + mypy
        run: pip install ruff==0.15.7 mypy==1.15.0

      - name: Run lint (includes format checks)
        run: make lint

  typecheck:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: spec-autopilot / TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: |
            plugins/spec-autopilot/gui/bun.lock
            plugins/spec-autopilot/runtime/server/bun.lock

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Install server dependencies
        run: cd plugins/spec-autopilot/runtime/server && bun install --frozen-lockfile

      - name: Run typecheck
        run: make typecheck

  build-dist:
    needs: [should-run, release-discipline, test-hooks, lint, typecheck]
    if: needs.should-run.outputs.skip != 'true'
    name: spec-autopilot / Build & Verify dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: plugins/spec-autopilot/gui/bun.lock

      - name: Install GUI dependencies
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Build dist
        run: make build

      - name: Verify dist structure
        run: |
          test -d dist/spec-autopilot/.claude-plugin
          test -f dist/spec-autopilot/.claude-plugin/plugin.json
          test -d dist/spec-autopilot/hooks
          test -d dist/spec-autopilot/skills
          test -d dist/spec-autopilot/runtime
          test -f dist/spec-autopilot/CLAUDE.md
          echo "dist/spec-autopilot structure OK"

      - name: Check dist not stale (committed dist must match fresh build)
        # dist staleness 检查仅按 commit message 匹配跳过（不要求 author），
        # 与 should-run 的双重匹配策略不同——这是有意为之:
        # 人工合并 Release PR 时 should-run 不跳过(CI 全量执行)，
        # 但 dist staleness 跳过(post-release 会负责重建 dist)。
        run: |
          # release-please / post-release 提交跳过 dist 一致性检查
          # 原因: release-please merge commit 只更新 plugin.json 版本号但不重建 dist，
          # post-release job 会在稍后重建并提交。两者并行时 test 先跑完会误报。
          HEAD_MSG=$(git log -1 --format='%s')
          HEAD_AUTHOR=$(git log -1 --format='%an')
          if echo "$HEAD_MSG" | grep -qE '^chore(\(main\))?: (release|post-release)'; then
            echo "ℹ️  release-please / post-release commit — skipping dist staleness check"
            exit 0
          fi
          if echo "$HEAD_AUTHOR" | grep -q 'github-actions'; then
            echo "ℹ️  bot commit — skipping dist staleness check"
            exit 0
          fi
          STALE=0
          # 检查已跟踪文件的变更
          if ! git diff --exit-code dist/spec-autopilot; then
            echo "❌ dist/spec-autopilot has modified tracked files"
            STALE=1
          fi
          # 检查未跟踪的新产物（fresh build 生成但未 git add 的文件）
          UNTRACKED=$(git ls-files --others --exclude-standard dist/spec-autopilot)
          if [ -n "$UNTRACKED" ]; then
            echo "❌ dist/spec-autopilot has untracked files:"
            echo "$UNTRACKED"
            STALE=1
          fi
          if [ "$STALE" -eq 1 ]; then
            echo "Run 'make build' and commit the result"
            exit 1
          fi
          echo "✅ dist/spec-autopilot is up-to-date"
