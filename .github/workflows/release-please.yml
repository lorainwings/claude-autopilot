name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # spec-autopilot outputs
      sa_release_created: ${{ steps.release.outputs['plugins/spec-autopilot--release_created'] }}
      sa_tag_name: ${{ steps.release.outputs['plugins/spec-autopilot--tag_name'] }}
      sa_version: ${{ steps.release.outputs['plugins/spec-autopilot--version'] }}
      # parallel-harness outputs
      ph_release_created: ${{ steps.release.outputs['plugins/parallel-harness--release_created'] }}
      ph_tag_name: ${{ steps.release.outputs['plugins/parallel-harness--tag_name'] }}
      ph_version: ${{ steps.release.outputs['plugins/parallel-harness--version'] }}
      # daily-report outputs
      dr_release_created: ${{ steps.release.outputs['plugins/daily-report--release_created'] }}
      dr_tag_name: ${{ steps.release.outputs['plugins/daily-report--tag_name'] }}
      dr_version: ${{ steps.release.outputs['plugins/daily-report--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  post-release:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true

      - name: Install spec-autopilot GUI dependencies
        if: needs.release-please.outputs.sa_release_created == 'true'
        run: cd plugins/spec-autopilot/gui && bun install --frozen-lockfile

      - name: Build spec-autopilot dist
        if: needs.release-please.outputs.sa_release_created == 'true'
        run: bash plugins/spec-autopilot/tools/build-dist.sh

      - name: Install parallel-harness dependencies
        if: needs.release-please.outputs.ph_release_created == 'true'
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Build parallel-harness dist
        if: needs.release-please.outputs.ph_release_created == 'true'
        run: bash plugins/parallel-harness/tools/build-dist.sh

      - name: Build daily-report dist
        if: needs.release-please.outputs.dr_release_created == 'true'
        run: bash plugins/daily-report/tools/build-dist.sh

      - name: Update plugin README & CLAUDE.md versions
        run: |
          SA_VER="${{ needs.release-please.outputs.sa_version }}"
          PH_VER="${{ needs.release-please.outputs.ph_version }}"

          # spec-autopilot README badge
          if [ -n "$SA_VER" ]; then
            sed -i "s/version-[0-9][0-9.]*-blue/version-${SA_VER}-blue/g" plugins/spec-autopilot/README.md plugins/spec-autopilot/README.zh.md
          fi

          # parallel-harness README title + version info (both EN and ZH)
          # CLAUDE.md 版本由 release-please extra-files (x-release-please-version 标记) 自动管理
          if [ -n "$PH_VER" ]; then
            # 标题: # parallel-harness v1.1.2 <!-- x-release-please-version -->
            sed -i "s/# parallel-harness v[0-9][0-9.]*/# parallel-harness v${PH_VER}/" plugins/parallel-harness/README.md plugins/parallel-harness/README.zh.md
            # 英文 Version Info: - **Version**: 1.1.2 (GA) <!-- x-release-please-version -->
            sed -i "s/\*\*Version\*\*: [0-9][0-9.]* (GA)/**Version**: ${PH_VER} (GA)/" plugins/parallel-harness/README.md
            # 中文 版本信息: - **版本**: v1.1.2 (GA) <!-- x-release-please-version -->
            sed -i "s/\*\*版本\*\*: v\{0,1\}[0-9][0-9.]* (GA)/**版本**: v${PH_VER} (GA)/" plugins/parallel-harness/README.zh.md
          fi

      - name: Update root README version table
        run: |
          SA_VER="${{ needs.release-please.outputs.sa_version }}"
          PH_VER="${{ needs.release-please.outputs.ph_version }}"
          DR_VER="${{ needs.release-please.outputs.dr_version }}"

          if [ -n "$SA_VER" ]; then
            sed -i "s/| \[spec-autopilot\](plugins\/spec-autopilot\/) | [0-9][0-9.]*\b/| [spec-autopilot](plugins\/spec-autopilot\/) | $SA_VER/" README.md
            sed -i "s/| \[spec-autopilot\](plugins\/spec-autopilot\/README\.zh\.md) | [0-9][0-9.]*\b/| [spec-autopilot](plugins\/spec-autopilot\/README.zh.md) | $SA_VER/" README.zh.md
          fi

          if [ -n "$PH_VER" ]; then
            sed -i "s/| \[parallel-harness\](plugins\/parallel-harness\/) | [0-9][0-9.]*\b/| [parallel-harness](plugins\/parallel-harness\/) | $PH_VER/" README.md
            sed -i "s/| \[parallel-harness\](plugins\/parallel-harness\/README\.zh\.md) | [0-9][0-9.]*\b/| [parallel-harness](plugins\/parallel-harness\/README.zh.md) | $PH_VER/" README.zh.md
          fi

          if [ -n "$DR_VER" ]; then
            sed -i "s/| \[daily-report\](plugins\/daily-report\/) | [0-9][0-9.]*\b/| [daily-report](plugins\/daily-report\/) | $DR_VER/" README.md
            sed -i "s/| \[daily-report\](plugins\/daily-report\/README\.zh\.md) | [0-9][0-9.]*\b/| [daily-report](plugins\/daily-report\/README.zh.md) | $DR_VER/" README.zh.md
          fi

      - name: Update marketplace.json versions
        run: |
          SA_VER="${{ needs.release-please.outputs.sa_version }}"
          PH_VER="${{ needs.release-please.outputs.ph_version }}"
          MARKETPLACE=".claude-plugin/marketplace.json"

          if [ -n "$SA_VER" ]; then
            jq --arg v "$SA_VER" '(.plugins[] | select(.name == "spec-autopilot")).version = $v' "$MARKETPLACE" > tmp.$$.json && mv tmp.$$.json "$MARKETPLACE"
          fi

          if [ -n "$PH_VER" ]; then
            jq --arg v "$PH_VER" '(.plugins[] | select(.name == "parallel-harness")).version = $v' "$MARKETPLACE" > tmp.$$.json && mv tmp.$$.json "$MARKETPLACE"
          fi

          DR_VER="${{ needs.release-please.outputs.dr_version }}"
          if [ -n "$DR_VER" ]; then
            jq --arg v "$DR_VER" '(.plugins[] | select(.name == "daily-report")).version = $v' "$MARKETPLACE" > tmp.$$.json && mv tmp.$$.json "$MARKETPLACE"
          fi

      - name: Update parallel-harness docs version headers
        if: needs.release-please.outputs.ph_release_created == 'true'
        run: |
          PH_VER="${{ needs.release-please.outputs.ph_version }}"
          if [ -z "$PH_VER" ]; then exit 0; fi

          echo "Updating docs version headers to v${PH_VER}..."

          # 英文: > Version: v1.0.0 (GA) | ...  或  > Version: 1.0.0 | ...
          find plugins/parallel-harness/docs -name '*.md' ! -name '*.zh.md' -exec \
            sed -i "s/^> Version: v\{0,1\}[0-9][0-9.]*\( (GA)\)\{0,1\} |/> Version: v${PH_VER} (GA) |/" {} +

          # 中文: > 版本: v1.0.0 (GA) | ...  或  > 版本: 1.0.0 | ...
          find plugins/parallel-harness/docs -name '*.zh.md' -exec \
            sed -i "s/^> 版本: v\{0,1\}[0-9][0-9.]*\( (GA)\)\{0,1\} |/> 版本: v${PH_VER} (GA) |/" {} +

      - name: Verify dist structure (post-release)
        run: |
          SA_CREATED="${{ needs.release-please.outputs.sa_release_created }}"
          PH_CREATED="${{ needs.release-please.outputs.ph_release_created }}"

          if [ "$SA_CREATED" = "true" ]; then
            echo "Verifying dist/spec-autopilot structure..."
            test -d dist/spec-autopilot/.claude-plugin
            test -f dist/spec-autopilot/.claude-plugin/plugin.json
            test -d dist/spec-autopilot/hooks
            test -d dist/spec-autopilot/skills
            test -d dist/spec-autopilot/runtime
            test -f dist/spec-autopilot/CLAUDE.md
            echo "dist/spec-autopilot structure OK"
          fi

          if [ "$PH_CREATED" = "true" ]; then
            echo "Verifying dist/parallel-harness structure..."
            test -d dist/parallel-harness/.claude-plugin
            test -f dist/parallel-harness/.claude-plugin/plugin.json
            test -d dist/parallel-harness/runtime
            test -d dist/parallel-harness/skills
            test -d dist/parallel-harness/config
            test -f dist/parallel-harness/CLAUDE.md
            echo "dist/parallel-harness structure OK"
          fi

          DR_CREATED="${{ needs.release-please.outputs.dr_release_created }}"
          if [ "$DR_CREATED" = "true" ]; then
            echo "Verifying dist/daily-report structure..."
            test -d dist/daily-report/.claude-plugin
            test -f dist/daily-report/.claude-plugin/plugin.json
            test -d dist/daily-report/skills
            test -f dist/daily-report/CLAUDE.md
            echo "dist/daily-report structure OK"
          fi

      - name: Commit post-release updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            dist/ \
            plugins/spec-autopilot/README.md plugins/spec-autopilot/README.zh.md \
            plugins/parallel-harness/README.md plugins/parallel-harness/README.zh.md \
            plugins/parallel-harness/docs/ \
            README.md README.zh.md \
            .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No post-release changes to commit"
          else
            SA_VER="${{ needs.release-please.outputs.sa_version }}"
            PH_VER="${{ needs.release-please.outputs.ph_version }}"
            DR_VER="${{ needs.release-please.outputs.dr_version }}"
            COMMIT_MSG="chore: post-release update dist + README versions"
            [ -n "$SA_VER" ] && COMMIT_MSG="$COMMIT_MSG [spec-autopilot@$SA_VER]"
            [ -n "$PH_VER" ] && COMMIT_MSG="$COMMIT_MSG [parallel-harness@$PH_VER]"
            [ -n "$DR_VER" ] && COMMIT_MSG="$COMMIT_MSG [daily-report@$DR_VER]"
            git commit -m "$COMMIT_MSG"
            # 带重试的 push（处理并发冲突）
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded"
                break
              fi
              if [ $i -eq 3 ]; then
                echo "Push failed after 3 attempts"
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
              echo "Push failed (attempt $i/3), rebasing..."
              if ! git pull --rebase; then
                echo "⚠️  Rebase conflict during retry, aborting rebase"
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
            done
          fi
