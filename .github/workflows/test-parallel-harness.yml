name: parallel-harness Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/parallel-harness/**'
      - 'dist/parallel-harness/**'
      - '.github/workflows/test-parallel-harness.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/parallel-harness/**'
      - 'dist/parallel-harness/**'
      - '.github/workflows/test-parallel-harness.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ── bot commit bypass ─────────────────────────────────────────────
  # release-please merge / post-release bot 提交会修改 plugins/parallel-harness/ 版本文件，
  # 触发本 workflow，但此时 dist 尚未由 post-release job 重建，导致 dist stale 检查失败。
  # 这里前置检测，bot 提交直接跳过所有后续 job。
  #
  # 注意: should-run 要求 author AND message 双重匹配——这是有意为之:
  # 当人工合并 Release PR 时，author 是人(skip=false)，CI 仍会执行 typecheck/test/lint，
  # 但 ph-build 的 dist staleness 检查单独按 commit message 匹配跳过（因为 post-release 会负责 dist）。

  should-run:
    name: Check if CI should run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect bot commits
        id: check
        run: |
          AUTHOR=$(git log -1 --format='%an')
          MSG=$(git log -1 --format='%s')
          if [[ "$AUTHOR" == *"github-actions"* ]] && \
             { [[ "$MSG" =~ ^chore:\ release\ main ]] || \
               [[ "$MSG" =~ ^chore\(main\):\ release ]] || \
               [[ "$MSG" =~ ^chore:\ post-release ]]; }; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Bot commit detected ($MSG) — skipping CI"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # ── release discipline ────────────────────────────────────────────

  release-discipline:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: Release Discipline Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            BEFORE="${{ github.event.before }}"
            # force-push 会使 before SHA 失效，回退到父提交
            if git rev-parse --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
              echo "ref=${BEFORE}" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️  before ref ${BEFORE} not found (force-push?), falling back to HEAD~1"
              echo "ref=${{ github.sha }}~1" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check release discipline (parallel-harness)
        run: bash scripts/check-release-discipline.sh ${{ steps.base.outputs.ref }} ${{ github.sha }} parallel-harness

  # ── parallel-harness ──────────────────────────────────────────────

  ph-typecheck:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: parallel-harness / TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: plugins/parallel-harness/bun.lock

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Run typecheck
        run: make ph-typecheck

  ph-test:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: parallel-harness / Unit & Integration Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: plugins/parallel-harness/bun.lock

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Run tests
        run: make ph-test

  ph-lint:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: parallel-harness / Lint (shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: make ph-lint

  ph-build:
    name: parallel-harness / Build dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [should-run, release-discipline, ph-typecheck, ph-test, ph-lint]
    if: needs.should-run.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: plugins/parallel-harness/bun.lock

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Build dist
        run: make ph-build

      - name: Verify dist structure
        run: |
          test -d dist/parallel-harness/.claude-plugin
          test -f dist/parallel-harness/.claude-plugin/plugin.json
          test -d dist/parallel-harness/runtime
          test -d dist/parallel-harness/skills
          test -d dist/parallel-harness/config
          test -f dist/parallel-harness/CLAUDE.md
          echo "dist/parallel-harness structure OK"

      - name: Check dist not stale (committed dist must match fresh build)
        # dist staleness 检查仅按 commit message 匹配跳过（不要求 author），
        # 与 should-run 的双重匹配策略不同——这是有意为之:
        # 人工合并 Release PR 时 should-run 不跳过(CI 全量执行)，
        # 但 dist staleness 跳过(post-release 会负责重建 dist)。
        run: |
          # 额外的 bot commit 安全网（与 should-run 互为冗余保护）
          HEAD_MSG=$(git log -1 --format='%s')
          HEAD_AUTHOR=$(git log -1 --format='%an')
          if echo "$HEAD_MSG" | grep -qE '^chore(\(main\))?: (release|post-release)'; then
            echo "ℹ️  release-please / post-release commit — skipping dist staleness check"
            exit 0
          fi
          if echo "$HEAD_AUTHOR" | grep -q 'github-actions'; then
            echo "ℹ️  bot commit — skipping dist staleness check"
            exit 0
          fi
          STALE=0
          # 检查已跟踪文件的变更
          if ! git diff --exit-code dist/parallel-harness; then
            echo "❌ dist/parallel-harness has modified tracked files"
            STALE=1
          fi
          # 检查未跟踪的新产物（fresh build 生成但未 git add 的文件）
          UNTRACKED=$(git ls-files --others --exclude-standard dist/parallel-harness)
          if [ -n "$UNTRACKED" ]; then
            echo "❌ dist/parallel-harness has untracked files:"
            echo "$UNTRACKED"
            STALE=1
          fi
          if [ "$STALE" -eq 1 ]; then
            echo "Run 'make ph-build' and commit the result"
            exit 1
          fi
          echo "✅ dist/parallel-harness is up-to-date"
