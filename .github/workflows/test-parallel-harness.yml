name: parallel-harness Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/parallel-harness/**'
      - 'dist/parallel-harness/**'
      - '.github/workflows/test-parallel-harness.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
      - 'Makefile'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.shellcheckrc'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/parallel-harness/**'
      - 'dist/parallel-harness/**'
      - '.github/workflows/test-parallel-harness.yml'
      - '.claude-plugin/**'
      - 'scripts/**'
      - '.githooks/**'
      - 'Makefile'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.shellcheckrc'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ── bot commit bypass ─────────────────────────────────────────────
  # 仅跳过 github-actions bot 的 post-release 回写提交。
  # release-please PR 本身（即使 bot 创建）不跳过，保证 typecheck/test/lint 正常执行。
  # 使用公共脚本 scripts/ci-detect-release-context.sh 统一判断。

  should-run:
    name: Check if CI should run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      skip_dist_stale: ${{ steps.check.outputs.skip_dist_stale }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 10

      - name: Detect release context
        id: check
        run: |
          # 获取所有检测结果
          eval "$(bash scripts/ci-detect-release-context.sh "${{ github.event.before || '' }}" "${{ github.sha }}")"

          # 仅 bot 的 post-release 提交才跳过整套 CI
          echo "skip=${IS_POST_RELEASE_BOT}" >> "$GITHUB_OUTPUT"

          # release 上下文（release merge commit / post-release）跳过 dist stale check
          echo "skip_dist_stale=${SKIP_DIST_STALE}" >> "$GITHUB_OUTPUT"

          echo "ℹ️  IS_POST_RELEASE_BOT=${IS_POST_RELEASE_BOT} SKIP_DIST_STALE=${SKIP_DIST_STALE}"

  # ── release discipline ────────────────────────────────────────────

  release-discipline:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: Release Discipline Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            BEFORE="${{ github.event.before }}"
            if git rev-parse --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
              echo "ref=${BEFORE}" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️  before ref ${BEFORE} not found (force-push?), falling back to HEAD~1"
              echo "ref=${{ github.sha }}~1" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check release discipline (parallel-harness)
        run: bash scripts/check-release-discipline.sh ${{ steps.base.outputs.ref }} ${{ github.sha }} parallel-harness

  # ── parallel-harness ──────────────────────────────────────────────

  ph-typecheck:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: parallel-harness / TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: plugins/parallel-harness/bun.lock

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Run typecheck
        run: make ph-typecheck

  ph-test:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: parallel-harness / Unit & Integration Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: plugins/parallel-harness/bun.lock

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Run tests
        run: make ph-test

  ph-lint:
    needs: [should-run]
    if: needs.should-run.outputs.skip != 'true'
    name: parallel-harness / Lint (shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: make ph-lint

  ph-build:
    name: parallel-harness / Build dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [should-run, release-discipline, ph-typecheck, ph-test, ph-lint]
    if: needs.should-run.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          cache: true
          cache-dependency-path: plugins/parallel-harness/bun.lock

      - name: Install dependencies
        run: cd plugins/parallel-harness && bun install --frozen-lockfile

      - name: Build dist
        run: make ph-build

      - name: Verify dist structure
        run: |
          test -d dist/parallel-harness/.claude-plugin
          test -f dist/parallel-harness/.claude-plugin/plugin.json
          test -d dist/parallel-harness/runtime
          test -d dist/parallel-harness/skills
          test -d dist/parallel-harness/config
          test -f dist/parallel-harness/CLAUDE.md
          echo "dist/parallel-harness structure OK"

      - name: Check dist not stale
        if: needs.should-run.outputs.skip_dist_stale != 'true'
        run: |
          STALE=0
          if ! git diff --exit-code dist/parallel-harness; then
            echo "❌ dist/parallel-harness has modified tracked files"
            STALE=1
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard dist/parallel-harness)
          if [ -n "$UNTRACKED" ]; then
            echo "❌ dist/parallel-harness has untracked files:"
            echo "$UNTRACKED"
            STALE=1
          fi
          if [ "$STALE" -eq 1 ]; then
            echo "Run 'make ph-build' and commit the result"
            exit 1
          fi
          echo "✅ dist/parallel-harness is up-to-date"
